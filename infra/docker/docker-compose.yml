  db:
    container_name: ragify-db
    image: mongo:8.2.3
    ports:
      - "${MONGO_PORT}:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-myuser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-mypassword}

    volumes:
      - ../volumes/mongo:/data/db
      - ../configs/mongo/mongod.conf:/etc/mongo/mongod.conf
      - ../configs/mongo/init.js:/docker-entrypoint-initdb.d/init.js

    command: ["mongod", "--config", "/etc/mongo/mongod.conf"]

  vector_db:
    container_name: ragify_qdrant
    image: qdrant/qdrant:v1.17
    ports:
      - "${QDRANT_HTTP_PORT}:6333"
      - "${QDRANT_GRPC_PORT}:6334"
    volumes:
      - ../volumes/qdrant:/qdrant/storage
      - ../configs/qdrant.yaml:/qdrant/config/config.yaml

    command: ["./qdrant", "--config-path", "/qdrant/config/config.yaml"]

  grobid:
    container_name: ragify-grobid
    image: grobid/grobid:0.9.0-crf
    ports:
      - "${GROBID_PORT:-8070}:8070"
    ulimits:
      core:
        soft: 0
        hard: 0
    init: true
    restart: unless-stopped

volumes:
  data:
